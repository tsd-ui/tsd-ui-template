name: CI

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"
      - "rekor-migration"
  workflow_dispatch:
  workflow_call:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Lint sources
        run: npm run lint
      - name: Check
        run: npm run format

  codeql:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v5
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript
          queries: security-extended,security-and-quality
          build-mode: none
      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@v4
